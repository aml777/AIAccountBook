name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Add Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip

      - name: Accept Android licenses
        run: yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install Android SDK components
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Initialize Capacitor
        run: npx cap init "AI记账本" "com.aiaccountbook.app" --web-dir=dist

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Web to Android
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AIAccountBook-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Display APK Info
        run: |
          echo "=== APK Build Complete ==="
          echo "APK Location: android/app/build/outputs/apk/debug/"
          ls -lh android/app/build/outputs/apk/debug/*.apk 2>/dev/null || echo "APK not found, check build logs"
